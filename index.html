<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이차방정식 수행평가 뷰어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; overscroll-behavior: none; }
        .no-select { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        #viewer-image { transition: transform 0.1s ease-out; cursor: grab; touch-action: none; }
        #viewer-image:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] flex flex-col font-sans">

    <!-- 상단 네비게이션: 제목만 깔끔하게 -->
    <header class="bg-white shadow-sm py-4 flex items-center justify-center z-20 relative">
        <h1 class="text-lg font-bold text-gray-800 tracking-tight">📝 수학 평가지 뷰어</h1>
    </header>

    <!-- 뷰어 메인 영역 -->
    <main id="main-area" class="flex-1 relative flex items-center justify-center bg-[#e5e7eb] overflow-hidden">
        
        <!-- 이미지 -->
        <img 
            id="viewer-image" 
            src="page1.png" 
            alt="수학 문제지" 
            class="max-w-full max-h-full object-contain bg-white shadow-xl no-select pointer-events-auto"
            draggable="false"
        >

        <!-- 플로팅 확대/축소 버튼 (우측 하단) -->
        <div class="absolute right-4 bottom-4 bg-white/90 backdrop-blur-sm shadow-lg rounded-full flex flex-col items-center py-2 px-1 space-y-2 z-20 border border-gray-200">
            <button onclick="zoomIn()" class="p-2 text-gray-600 hover:bg-gray-200 rounded-full active:bg-gray-300 transition-colors" title="확대">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <span id="zoom-text" class="text-[11px] font-bold text-gray-600">100%</span>
            <button onclick="zoomOut()" class="p-2 text-gray-600 hover:bg-gray-200 rounded-full active:bg-gray-300 transition-colors" title="축소">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <div class="w-6 h-px bg-gray-300 my-1"></div>
            <button onclick="resetZoom()" class="p-2 text-gray-600 hover:bg-gray-200 rounded-full active:bg-gray-300 transition-colors" title="원래 크기">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
            </button>
        </div>
    </main>

    <!-- 하단 탭: 페이지 선택 (모바일 친화적) -->
    <footer class="bg-white border-t border-gray-200 p-3 z-20 relative flex gap-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button id="tab1" onclick="setPage(1)" class="flex-1 py-3.5 rounded-xl text-base font-bold bg-blue-50 text-blue-600 border border-blue-200 transition-all active:scale-[0.98]">
            1 페이지
        </button>
        <button id="tab2" onclick="setPage(2)" class="flex-1 py-3.5 rounded-xl text-base font-bold bg-gray-50 text-gray-500 border border-gray-200 transition-all active:scale-[0.98]">
            2 페이지
        </button>
    </footer>

    <!-- 자바스크립트 -->
    <script>
        const img = document.getElementById('viewer-image');
        const mainArea = document.getElementById('main-area');
        const zoomText = document.getElementById('zoom-text');
        const tab1 = document.getElementById('tab1');
        const tab2 = document.getElementById('tab2');

        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;

        const images = {
            1: 'page1.png',
            2: 'page2.png'
        };

        // 화면 갱신 함수
        function updateTransform() {
            img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            zoomText.innerText = Math.round(scale * 100) + '%';
        }

        // 탭 변경 함수
        function setPage(pageNum) {
            img.src = images[pageNum];
            
            // 페이지 전환 시 초기화
            scale = 1; translateX = 0; translateY = 0; updateTransform();

            // 탭 스타일 변경
            const activeStyle = "flex-1 py-3.5 rounded-xl text-base font-bold bg-blue-50 text-blue-600 border border-blue-200 transition-all active:scale-[0.98]";
            const inactiveStyle = "flex-1 py-3.5 rounded-xl text-base font-bold bg-gray-50 text-gray-500 border border-gray-200 transition-all active:scale-[0.98]";

            if(pageNum === 1) {
                tab1.className = activeStyle; tab2.className = inactiveStyle;
            } else {
                tab2.className = activeStyle; tab1.className = inactiveStyle;
            }
        }

        // 확대/축소
        function zoomIn() { scale = Math.min(scale + 0.25, 4); updateTransform(); }
        function zoomOut() { scale = Math.max(scale - 0.25, 0.5); updateTransform(); }
        function resetZoom() { scale = 1; translateX = 0; translateY = 0; updateTransform(); }

        // 마우스 휠
        mainArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) zoomIn(); else zoomOut();
        }, { passive: false });

        // --- 마우스 & 모바일 터치 드래그 로직 ---
        function onDragStart(clientX, clientY) {
            isDragging = true;
            startX = clientX - translateX;
            startY = clientY - translateY;
        }

        function onDragMove(clientX, clientY) {
            if (!isDragging) return;
            translateX = clientX - startX;
            translateY = clientY - startY;
            updateTransform();
        }

        function onDragEnd() { isDragging = false; }

        // 데스크탑 마우스 이벤트
        img.addEventListener('mousedown', (e) => onDragStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => onDragMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onDragEnd);

        // 모바일 터치 이벤트
        img.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                onDragStart(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                e.preventDefault(); // 화면 스크롤, 당겨서 새로고침 방지
                onDragMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchend', onDragEnd);
    </script>
</body>
</html>
